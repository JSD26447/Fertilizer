<div class="admin-shell">
  <!-- 📱 Hamburger toggle button (mobile only) -->
  <button class="sidebar-toggle" (click)="toggleSidebar()" aria-label="เปิดเมนู">☰</button>

  <!-- 📱 Overlay to close sidebar on mobile -->
  <div class="sidebar-overlay" [class.visible]="sidebarOpen" (click)="closeSidebar()"></div>

  <aside class="sidebar" [class.open]="sidebarOpen">
    <div class="sidebar-logo">
      <span class="logo-icon">🌿</span>
      <div>
        <div class="logo-name">ร้านปุ๋ยชาวนา</div>
        <div class="logo-role">แผงควบคุม</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" routerLink="/admin/dashboard" routerLinkActive="active" (click)="closeSidebar()">
        <span>📊</span> แดชบอร์ด
      </a>
      <a class="nav-item" routerLink="/admin/products" routerLinkActive="active" (click)="closeSidebar()">
        <span>🌿</span> จัดการสินค้า
      </a>
      <a class="nav-item" routerLink="/admin/orders" routerLinkActive="active" (click)="closeSidebar()">
        <span>📋</span> ออเดอร์
      </a>

      <!-- 📢 เมนูแผงควบคุมโปรโมชั่นหน้าใหม่ที่เราทำขึ้นมา -->
      <a class="nav-item" routerLink="/admin/promotions" routerLinkActive="active" (click)="closeSidebar()">
        <span>📢</span> โปรโมชั่น & ข่าวสาร
      </a>

    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <span class="user-avatar">👤</span>
        <span class="user-name">{{ username }}</span>
      </div>
      <button class="nav-item logout-btn" (click)="logout()"><span>🚪</span> ออกจากระบบ</button>
      <button class="nav-item store-btn" (click)="goHome()"><span>🏪</span> ดูหน้าร้าน</button>
    </div>
  </aside>
  <main class="admin-main">
    <router-outlet></router-outlet>
  </main>

  <!-- 🤖 หน้าต่าง AI Chatbot อัจฉริยะ (Floating Widget) -->
  <div class="ai-chatbot-container" [class.active]="chatOpen">
    <!-- ปุ่มสำหรับย่อ/ขยายหน้าต่างแชท -->
    <button class="ai-chat-toggle-btn" (click)="toggleChat()" [class.unread]="hasUnread">
      <span class="btn-icon">🤖</span>
      <span class="btn-text">ถามน้องปุ๋ย AI</span>
      <span class="unread-dot" *ngIf="hasUnread"></span>
    </button>

    <!-- กล่องหน้าต่างสนทนา AI -->
    <div class="ai-chat-window" *ngIf="chatOpen">
      <!-- หัวหน้าต่าง (Header) ดีไซน์พรีเมียม -->
      <div class="ai-chat-header">
        <div class="ai-avatar-info">
          <span class="ai-header-avatar">🤖</span>
          <div>
            <div class="ai-header-title">น้องปุ๋ย AI 🌿</div>
            <div class="ai-header-subtitle">ผู้ช่วยแอดมินคนเก่ง • ออนไลน์</div>
          </div>
        </div>
        <button class="ai-close-btn" (click)="toggleChat()">×</button>
      </div>

      <!-- พื้นที่แสดงประวัติข้อความ (Message Body) -->
      <div class="ai-chat-body" #chatBody>
        <div class="ai-message-wrapper" *ngFor="let msg of chatMessages" [class.user]="msg.isUser">
          <div class="ai-message-avatar" *ngIf="!msg.isUser">🤖</div>
          <div class="ai-message-bubble">
            <div class="ai-message-text" [innerHTML]="msg.text"></div>
            <span class="ai-message-time">{{ msg.time }}</span>
          </div>
        </div>

        <!-- ตัวแสดงสถานะกำลังพิมพ์ (Typing Indicator) -->
        <div class="ai-message-wrapper" *ngIf="aiLoading">
          <div class="ai-message-avatar">🤖</div>
          <div class="ai-message-bubble ai-typing-bubble">
            <div class="typing-indicator">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
        </div>
      </div>

      <!-- แถบปุ่มคำแนะนำด่วน (Quick Suggestion Chips) -->
      <div class="ai-chat-suggestions">
        <button class="suggestion-chip" *ngFor="let suggestion of chatSuggestions" (click)="sendSuggestion(suggestion)">
          {{ suggestion }}
        </button>
      </div>

      <!-- แถบป้อนข้อมูลรับส่งข้อความ (Footer Input) -->
      <div class="ai-chat-footer">
        <input type="text" class="ai-chat-input" placeholder="พิมพ์คำถามถึงสต๊อกปุ๋ย หรือคิวนัดรับ..."
          [(ngModel)]="chatInputText" (keyup.enter)="sendChatMessage()" />
        <button class="ai-send-btn" (click)="sendChatMessage()">
          <span>ส่ง</span>
        </button>
      </div>
    </div>
  </div>
</div>
